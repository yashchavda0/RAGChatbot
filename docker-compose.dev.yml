# Lightweight Development Docker Compose for RAG Chatbot
# Backend + Frontend in Docker, with memory limits
# No Milvus/etcd/MinIO — uses Gemini API for embeddings
# Usage: docker-compose -f docker-compose.dev.yml up -d --build

services:
  # ==========================================================================
  # INFRASTRUCTURE
  # ==========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres-dev
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: rag_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d rag_chatbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis-dev
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 192M
    restart: unless-stopped

  # ==========================================================================
  # BACKEND (FastAPI with hot-reload)
  # ==========================================================================

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: development
    container_name: rag-backend-dev
    # Override CMD to add --reload for dev (entrypoint uses exec "$@")
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      POSTGRES_URL: postgresql://raguser:ragpassword@postgres:5432/rag_chatbot
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      AZURE_DOC_INTELLIGENCE_ENDPOINT: ${AZURE_DOC_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOC_INTELLIGENCE_KEY: ${AZURE_DOC_INTELLIGENCE_KEY:-}
      EMBEDDING_MODELS: '["gemini-text-embedding-004"]'
      DEFAULT_EMBEDDING_MODEL: gemini-text-embedding-004
      MILVUS_DIMENSION: 768
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_dev_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ==========================================================================
  # FRONTEND (Next.js with hot-reload)
  # ==========================================================================

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: rag-frontend-dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NODE_ENV: development
      WATCHPACK_POLLING: true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  postgres_dev_data:
  redis_dev_data:
  backend_dev_data:
