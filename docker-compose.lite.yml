# ========================================
# LIGHTWEIGHT DOCKER COMPOSE
# ========================================
# Only includes essential services for local CPU development
# Removed: Milvus, etcd, Minio (replaced by ChromaDB)
# Kept: PostgreSQL (for LangGraph checkpointer), Redis (for caching)

services:
  # PostgreSQL Database (Required for LangGraph checkpointer)
  postgres:
    image: postgres:15-alpine
    container_name: rag-postgres-lite
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: rag_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_lite_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache (Optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: rag-redis-lite
    ports:
      - "6379:6379"
    volumes:
      - redis_lite_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_lite_data:
  redis_lite_data:

# ========================================
# TO RUN BACKEND LOCALLY (without Docker):
#
# 1. Start infrastructure only:
#    docker-compose -f docker-compose.lite.yml up -d
